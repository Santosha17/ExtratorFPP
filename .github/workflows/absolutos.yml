name: ScraperLiga - Absolutos (Alta Velocidade)

on:
  schedule:
    - cron: '0 8 * * 0,1,5,6'
    - cron: '0 17 * * 0,5,6'
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: ZONAS NORMAIS E RÁPIDAS (14 Máquinas)
  # ----------------------------------------------------
  scrape-normais:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zona: [
          "Zona 1A", "Zona 1B", "Zona 1C",
          "Zona 3A", "Zona 3B", "Zona 3C",
          "Zona 4A", "Zona 4B", "Zona 4C", "Zona 4D",
          "Zona 6B", "Zona 7A", "Zona 8A", "Zona 8B"
        ]
    name: Abs - ${{ matrix.zona }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scraperLiga.js
        env:
          SUPABASE_URL_SN_LIGA: ${{ secrets.SUPABASE_URL_SN_LIGA }}
          SUPABASE_KEY_SN_LIGA: ${{ secrets.SUPABASE_KEY_SN_LIGA }}
          SCRAPE_TIPO: "Absolutos"
          SCRAPE_ZONA: ${{ matrix.zona }}

  # ----------------------------------------------------
  # JOB 2: ZONAS MÉDIAS (Divididas em M e F = 6 Máquinas)
  # ----------------------------------------------------
  scrape-medias:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zona: ["Zona 3D", "Zona 6A", "Zona 7B"]
        categoria: ["Masculinos", "Femininos"]
    name: Abs - ${{ matrix.zona }} (${{ matrix.categoria }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scraperLiga.js
        env:
          SUPABASE_URL_SN_LIGA: ${{ secrets.SUPABASE_URL_SN_LIGA }}
          SUPABASE_KEY_SN_LIGA: ${{ secrets.SUPABASE_KEY_SN_LIGA }}
          SCRAPE_TIPO: "Absolutos"
          SCRAPE_ZONA: ${{ matrix.zona }}
          SCRAPE_CATEGORIA: ${{ matrix.categoria }}

  # ----------------------------------------------------
  # JOB 3: ZONAS 2 E 5 - CATEGORIAS LIGEIRAS (8 Máquinas)
  # ----------------------------------------------------
  scrape-pesadas-ligeiras:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zona: ["Zona 2", "Zona 5"]
        categoria: ["Femininos", "Masculinos 1", "Masculinos 2", "Masculinos 3"]
    name: Abs - ${{ matrix.zona }} (${{ matrix.categoria }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scraperLiga.js
        env:
          SUPABASE_URL_SN_LIGA: ${{ secrets.SUPABASE_URL_SN_LIGA }}
          SUPABASE_KEY_SN_LIGA: ${{ secrets.SUPABASE_KEY_SN_LIGA }}
          SCRAPE_TIPO: "Absolutos"
          SCRAPE_ZONA: ${{ matrix.zona }}
          SCRAPE_CATEGORIA: ${{ matrix.categoria }}

  # ----------------------------------------------------
  # JOB 4: ZONAS 2 E 5 - M4, M5, M6 POR GRUPO (54 Máquinas)
  # ----------------------------------------------------
  scrape-pesadas-grupos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zona: ["Zona 2", "Zona 5"]
        categoria: ["Masculinos 4", "Masculinos 5", "Masculinos 6"]
        grupo: [
          "Grupo A", "Grupo B", "Grupo C",
          "Grupo D", "Grupo E", "Grupo F",
          "Grupo G", "Grupo H", "Grupo I"
        ]
    name: Abs - ${{ matrix.zona }} (${{ matrix.categoria }} - ${{ matrix.grupo }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scraperLiga.js
        env:
          SUPABASE_URL_SN_LIGA: ${{ secrets.SUPABASE_URL_SN_LIGA }}
          SUPABASE_KEY_SN_LIGA: ${{ secrets.SUPABASE_KEY_SN_LIGA }}
          SCRAPE_TIPO: "Absolutos"
          SCRAPE_ZONA: ${{ matrix.zona }}
          SCRAPE_CATEGORIA: ${{ matrix.categoria }}
          SCRAPE_GRUPO: ${{ matrix.grupo }}
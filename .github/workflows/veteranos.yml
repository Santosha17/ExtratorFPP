name: ScraperLiga - Veteranos (Todas as Zonas M F)

on:
  schedule:
    # Sextas, Sábados, Domingos e Segundas às 09:00 (8:00 UTC)
    - cron: '0 8 * * 0,1,5,6'
    # Sextas, Sábados e Domingos às 18:00 (17:00 UTC)
    - cron: '0 17 * * 0,5,6'
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: TODAS AS ZONAS (EXCETO ZONA 5)
  # ----------------------------------------------------
  scrape-veteranos-normais:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Retirámos a Zona 5 daqui
        zona: [
          "Zona 1A", "Zona 1B", "Zona 1C",
          "Zona 2",
          "Zona 3A", "Zona 3B", "Zona 3C", "Zona 3D",
          "Zona 4A", "Zona 4B", "Zona 4C", "Zona 4D",
          "Zona 6A", "Zona 6B",
          "Zona 7A", "Zona 7B",
          "Zona 8A", "Zona 8B"
        ]

    name: Veteranos - ${{ matrix.zona }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Executar Scraper
        env:
          SUPABASE_URL_SN_LIGA: ${{ secrets.SUPABASE_URL_SN_LIGA }}
          SUPABASE_KEY_SN_LIGA: ${{ secrets.SUPABASE_KEY_SN_LIGA }}
          SCRAPE_TIPO: "Veteranos"
          SCRAPE_ZONA: ${{ matrix.zona }}
        run: node scraperLiga.js

  # ----------------------------------------------------
  # JOB 2: ESPECIAL ZONA 5 (Dividido M / F)
  # ----------------------------------------------------
  scrape-veteranos-zona-5:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Multiplicamos a máquina pelos dois géneros
        categoria: ["Masculinos", "Femininos"]

    name: Veteranos - Zona 5 (${{ matrix.categoria }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Executar Scraper
        env:
          SUPABASE_URL_SN_LIGA: ${{ secrets.SUPABASE_URL_SN_LIGA }}
          SUPABASE_KEY_SN_LIGA: ${{ secrets.SUPABASE_KEY_SN_LIGA }}
          SCRAPE_TIPO: "Veteranos"
          SCRAPE_ZONA: "Zona 5"
          SCRAPE_CATEGORIA: ${{ matrix.categoria }}
        run: node scraperLiga.js